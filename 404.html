<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  .page-404 {
    min-height: 100vh;
    background-color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    overflow: hidden;
    position: relative;
    padding: 2rem;
  }

  /* Animated background grid */
  .page-404::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridDrift {
    0%   { transform: translateY(0); }
    100% { transform: translateY(48px); }
  }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: #6366f1;
    top: -100px; left: -100px;
    animation: orbFloat 8s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 300px; height: 300px;
    background: #0ea5e9;
    bottom: -80px; right: -80px;
    animation: orbFloat 10s ease-in-out infinite alternate-reverse;
  }

  @keyframes orbFloat {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.1); }
  }

  .content-404 {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 560px;
  }

  /* Big 404 number */
  .number-404 {
    font-size: clamp(7rem, 20vw, 12rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.05em;
    background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 50%, #475569 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    animation: fadeSlideDown 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Glitch effect on 404 */
  .number-404::before,
  .number-404::after {
    content: '404';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #6366f1, #0ea5e9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .number-404::before {
    animation: glitch1 4s infinite;
    clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
  }
  .number-404::after {
    animation: glitch2 4s infinite;
    clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
  }

  @keyframes glitch1 {
    0%, 90%, 100% { transform: translate(0); opacity: 0; }
    92% { transform: translate(-4px, 1px); opacity: 0.6; }
    94% { transform: translate(4px, -1px); opacity: 0.6; }
    96% { transform: translate(0); opacity: 0; }
  }
  @keyframes glitch2 {
    0%, 85%, 100% { transform: translate(0); opacity: 0; }
    87% { transform: translate(4px, 2px); opacity: 0.5; }
    89% { transform: translate(-4px, -2px); opacity: 0.5; }
    91% { transform: translate(0); opacity: 0; }
  }

  /* SVG Illustration */
  .illustration {
    margin: 0 auto 2rem;
    width: 180px;
    height: 180px;
    animation: fadeSlideDown 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Floating astronaut pieces */
  .float-slow { animation: floatY 4s ease-in-out infinite alternate; }
  .float-mid  { animation: floatY 3s ease-in-out infinite alternate-reverse; }
  .float-fast { animation: floatY 2.5s ease-in-out infinite alternate; }

  @keyframes floatY {
    from { transform: translateY(0px) rotate(0deg); }
    to   { transform: translateY(-10px) rotate(3deg); }
  }

  .tagline {
    font-size: 1.25rem;
    font-weight: 700;
    color: #f1f5f9;
    margin: 0 0 0.75rem;
    animation: fadeSlideDown 0.7s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .subtitle {
    font-size: 0.95rem;
    color: #64748b;
    font-weight: 300;
    line-height: 1.7;
    margin: 0 0 2.5rem;
    animation: fadeSlideDown 0.7s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .actions {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeSlideDown 0.7s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    background: #4f46e5;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    border-radius: 0.5rem;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 rgba(99,102,241,0);
  }
  .btn-primary:hover {
    background: #4338ca;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(99,102,241,0.35);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    background: transparent;
    color: #94a3b8;
    font-family: 'Sora', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    border-radius: 0.5rem;
    border: 1px solid #334155;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, transform 0.2s;
  }
  .btn-secondary:hover {
    border-color: #64748b;
    color: #e2e8f0;
    transform: translateY(-2px);
  }

  /* Error code badge */
  .error-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #6366f1;
    background: rgba(99,102,241,0.1);
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 9999px;
    padding: 0.3rem 0.8rem;
    margin-bottom: 1.5rem;
    animation: fadeSlideDown 0.7s 0s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .error-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: #6366f1;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
